#中科智教5.0
#用户端
server {
        listen 7007;
   	#      listen 443 ssl;
#        server_name localhost;
#         if ( $scheme = http ) {
#           return 301 https://$host$request_uri;
#         }
        gzip on;
        gzip_min_length 1k;
        gzip_comp_level 9;
        gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";
        error_log  /home/root/nginx/logs/error.log;
        access_log  /home/root/nginx/logs/access.log;
        client_max_body_size 1024M;
#        ssl_certificate /home/root/nginx/cert/zkhmdi2025.com.pem;
#        ssl_certificate_key /home/root/nginx/cert/zkhmdi2025.com.key;
#        ssl_session_timeout 5m;
#        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4; #加密算法
#        ssil_protocols TLSv1 TLSv1.1 TLSv1.2;
#        ssl_prefer_server_ciphers on;
        location / {
            root  /home/root/nginx/zkzj/eduStudent;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
        }
        location /profile/upload/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://localhost:8081/profile/upload/;
        }
        location /zkhm/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://localhost:9000/zkhm/;
        }
        location /prod-api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://localhost:8081/;
        }
        location /lib/aliyun-upload-sdk/ {
            alias /home/root/nginx/zkzj/eduStudent/lib/aliyun-upload-sdk/;
        }
        location /websocket/ {
            proxy_redirect off;
            proxy_read_timeout 600s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://localhost:8081;
        }
        location /ebook {
                        alias html/ebook-lib/;
                        index index.html index.htm;
                        try_files $uri $uri/ /index.html;
                }
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }


}

